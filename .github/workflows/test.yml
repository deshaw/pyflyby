name: Run tests

on:
  push:
    branches: [master]
  pull_request:
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "3.14t"
        include:
          # The macOS run is by far the slowest, so split it into two
          # independently-restartable shards: the slow test_interactive.py in
          # one, everything else in the other.
          - os: macos-latest
            python-version: "3.12"
            shard: "1"
            pytest-target: "tests/test_interactive.py"
          - os: macos-latest
            python-version: "3.12"
            shard: "2"
            pytest-target: "--ignore=tests/test_interactive.py lib tests"
          - os: macos-latest
            python-version: "3.14"
            shard: "1"
            pytest-target: "tests/test_interactive.py"
          - os: macos-latest
            python-version: "3.14"
            shard: "2"
            pytest-target: "--ignore=tests/test_interactive.py lib tests"

    env:
      DEBUG_TEST_PYFLYBY: 1
      ENVNAME: ${{matrix.os}}-${{matrix.python-version}}${{ matrix.shard && format('-{0}', matrix.shard) || '' }}

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - name: Install gdb
      if: matrix.os == 'ubuntu-latest'
      run: |
          sudo apt update
          sudo apt install gdb -y

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
        cache-dependency-glob: |
          "pyproject.toml"

    - name: Install pyflyby
      run: |
        uv python install ${{matrix.python-version}}
        uv venv

        # Include build dependencies for run time; see
        # https://mesonbuild.com/meson-python/how-to-guides/editable-installs.html#build-dependencies
        # for details.
        uv pip install meson-python meson ninja "pybind11>=2.10.4" "setuptools-scm>=8"
        uv pip install --no-build-isolation -ve ".[test]"
    - name: test release build
      run: |
        uv run python -m build
    - name: compileall
      run: |
        uv run python -We:invalid -m compileall -f -q lib/ etc/;

    - name: check-parse pyflyby
      run: |
        uv run python -m pyflyby.check_parse lib/python/pyflyby

    - name: pytest Mac OS
      if: ${{ matrix.os == 'macos-latest'}}
      # json report can't be installed on Py2, and make macos super slow.
      # The macOS run is the slowest, so it is split into independently
      # restartable shards; matrix.pytest-target selects this shard's tests.
      env:
        PYTEST_TARGET: ${{ matrix.pytest-target }}
      run: |
        # PYTEST_TARGET intentionally word-splits into multiple pytest args.
        # shellcheck disable=SC2086
        uv run python -m pytest --cov=pyflyby --cov=tests --cov-report=xml --doctest-modules --maxfail=3 \
               $PYTEST_TARGET
    - name: pytest (not MacOS)
      if: ${{ matrix.os != 'macos-latest'  }}
      run: |
        uv run python -m pytest --cov=pyflyby --cov=tests --cov-report=xml\
               --doctest-modules\
               --maxfail=3\
               --json-report\
               --json-report-file="report-${ENVNAME}.json"\
               lib tests

    - name: Set up Emacs
      # Only run the emacs integration once per (os, python) combo, i.e. skip
      # the second macOS shard.
      if: ${{ matrix.shard != '2' }}
      uses: purcell/setup-emacs@bdc64dc730ae1fcba200bfd52cb1b4cf6159cbe5
      with:
        version: 30.2

    - name: Test emacs integration
      if: ${{ matrix.shard != '2' }}
      run: |
        uv run emacs -Q --batch -L lib/emacs -L tests -l tests/test-emacs.el -f ert-run-tests-batch-and-exit

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      name: upload pytest timing reports as json
      with:
        name: pytest-timing-${{ env.ENVNAME }}
        path: ./report-*.json
    - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  cpython-smoke:
    name: tidy-imports smoke test on CPython
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install pyflyby
        run: |
          uv python install 3.14
          uv venv
          uv pip install meson-python meson ninja "pybind11>=2.10.4" "setuptools-scm>=8"
          uv pip install --no-build-isolation -ve .

      - name: Shallow-clone CPython
        run: git clone --depth=1 --quiet https://github.com/python/cpython.git /tmp/cpython

      - name: Run tidy-imports on all CPython .py files
        run: |
          # Files known to cause issues with tidy-imports (e.g. encoding quirks,
          # intentionally broken syntax used in tests, etc.)
          rm /tmp/cpython/Lib/test/encoded_modules/module_iso_8859_1.py
          rm /tmp/cpython/Lib/test/encoded_modules/module_koi8_r.py
          rm /tmp/cpython/Lib/test/test_import/data/syntax_warnings.py
          rm /tmp/cpython/Lib/test/test_tarfile.py
          rm /tmp/cpython/Lib/test/tokenizedata/bad_coding2.py
          rm /tmp/cpython/Lib/test/tokenizedata/badsyntax_3131.py
          rm /tmp/cpython/Lib/test/tokenizedata/badsyntax_pep3120.py

          uv run tidy-imports --no-add --no-remove-unused --symlink=skip --action=NOTHING /tmp/cpython >/dev/null
